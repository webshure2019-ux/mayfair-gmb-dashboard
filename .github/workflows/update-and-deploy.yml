name: Update and Deploy Dashboard

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Choose the deploy mode"
        required: true
        default: deploy_only
        type: choice
        options:
          - deploy_only
          - manual_rebuild
          - preview
          - full
      branch_ids:
        description: "Optional comma-separated branch IDs"
        required: false
        default: ""
      max_reviews:
        description: "Optional max reviews per selected branch"
        required: false
        default: ""
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mayfair-gmb-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GBP_CLIENT_ID: ${{ secrets.GBP_CLIENT_ID }}
      GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
      GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
      GBP_BRANCH_IDS: ${{ github.event.inputs.branch_ids || '' }}
      GBP_MAX_REVIEWS: ${{ github.event.inputs.max_reviews || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Require GBP secrets for preview and full runs
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode != 'deploy_only' && (env.GBP_CLIENT_ID == '' || env.GBP_CLIENT_SECRET == '' || env.GBP_REFRESH_TOKEN == '') }}
        run: |
          echo "GBP_CLIENT_ID, GBP_CLIENT_SECRET, and GBP_REFRESH_TOKEN must all be configured for preview/full runs."
          exit 1

      - name: Refresh review data from Google Business Profile
        id: gbp_refresh
        if: ${{ env.GBP_CLIENT_ID != '' && env.GBP_CLIENT_SECRET != '' && env.GBP_REFRESH_TOKEN != '' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'full')) }}
        continue-on-error: ${{ github.event_name == 'schedule' }}
        run: python3 scripts/fetch_reviews.py

      - name: Preview Google Business Profile fetch without replacing live data
        if: ${{ env.GBP_CLIENT_ID != '' && env.GBP_CLIENT_SECRET != '' && env.GBP_REFRESH_TOKEN != '' && github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'preview' }}
        env:
          GBP_PREVIEW_MODE: 1
          GBP_MAX_REVIEWS: ${{ github.event.inputs.max_reviews || '1' }}
        run: python3 scripts/fetch_reviews.py

      - name: Build deploy dataset from manual fallback files
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'deploy_only' || github.event.inputs.run_mode == 'manual_rebuild')) || (github.event_name == 'schedule' && ((env.GBP_CLIENT_ID == '' || env.GBP_CLIENT_SECRET == '' || env.GBP_REFRESH_TOKEN == '') || steps.gbp_refresh.outcome == 'failure')) }}
        run: python3 scripts/build_manual_dataset.py

      - name: Note manual fallback mode
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'deploy_only' || github.event.inputs.run_mode == 'manual_rebuild')) }}
        run: echo "This run is deploying the repo's manual fallback dataset, built from data/manual/base-reviews.json plus manual additions."

      - name: Note scheduled fallback
        if: ${{ github.event_name == 'schedule' && ((env.GBP_CLIENT_ID == '' || env.GBP_CLIENT_SECRET == '' || env.GBP_REFRESH_TOKEN == '') || steps.gbp_refresh.outcome == 'failure') }}
        run: echo "The scheduled Google Business Profile refresh did not complete, so the manual fallback dataset was rebuilt and redeployed instead."

      - name: Validate preview dataset
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'preview' }}
        run: python3 scripts/validate_dashboard_data.py data/preview/reviews-preview.json

      - name: Validate deploy dataset
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'preview' }}
        run: python3 scripts/validate_dashboard_data.py data/reviews.json

      - name: Upload Pages artifact
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'preview' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'preview' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
