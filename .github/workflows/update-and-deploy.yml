name: Update and Deploy Dashboard

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Choose whether to fetch live Apify data"
        required: true
        default: deploy_only
        type: choice
        options:
          - deploy_only
          - preview
          - full
      branch_ids:
        description: "Optional comma-separated branch IDs"
        required: false
        default: ""
      max_reviews:
        description: "Optional max reviews per selected branch"
        required: false
        default: ""
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mayfair-gmb-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      APIFY_LANGUAGE: en
      APIFY_BRANCH_IDS: ${{ github.event.inputs.branch_ids || '' }}
      APIFY_MAX_REVIEWS: ${{ github.event.inputs.max_reviews || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Refresh review data from Apify
        id: apify_refresh
        if: ${{ env.APIFY_API_TOKEN != '' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'full')) }}
        continue-on-error: ${{ github.event_name == 'schedule' }}
        run: python3 scripts/fetch_reviews.py

      - name: Preview Apify fetch without replacing live data
        if: ${{ env.APIFY_API_TOKEN != '' && github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'preview' }}
        env:
          APIFY_MAX_REVIEWS: ${{ github.event.inputs.max_reviews || '1' }}
          APIFY_SKIP_WRITE: 1
        run: python3 scripts/fetch_reviews.py

      - name: Preserve currently published dataset
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'deploy_only') || (github.event_name == 'schedule' && (env.APIFY_API_TOKEN == '' || steps.apify_refresh.outcome == 'failure')) }}
        env:
          PAGES_DATA_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/reviews.json
        run: |
          if curl -fsSL "$PAGES_DATA_URL" -o data/reviews.json; then
            echo "Reused the currently published dataset for this deploy."
          else
            echo "No published dataset was available. Keeping the repository copy."
          fi

      - name: Note demo mode
        if: ${{ env.APIFY_API_TOKEN == '' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode != 'full') }}
        run: echo "No fresh live dataset replacement happened in this run. The latest available dataset will be deployed."

      - name: Note scheduled fallback
        if: ${{ github.event_name == 'schedule' && (env.APIFY_API_TOKEN == '' || steps.apify_refresh.outcome == 'failure') }}
        run: echo "The scheduled Apify refresh did not complete, so the last published live dataset was redeployed."

      - name: Validate preview dataset
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'preview' }}
        run: python3 scripts/validate_dashboard_data.py data/preview/reviews-preview.json

      - name: Validate deploy dataset
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'preview' }}
        run: python3 scripts/validate_dashboard_data.py data/reviews.json

      - name: Upload Pages artifact
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'preview' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'preview' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
